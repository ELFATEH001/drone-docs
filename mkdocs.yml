site_name: Drone Project — UCB Lyon 1
theme:
  name: material
  palette:
    # primary: indigo
    primary: orange
    # accent: orange

nav:
  - Home: index.md
  # - Drone configuration: configuration.md
  - Hardware: hardware.md
  - SE3 Controller: controller.md
  - ROS 2 Stack: ros2.md
  - Simulation: simulation.md
  
  

markdown_extensions:
  # Enables the colored warning/info boxes
  - admonition
  - pymdownx.details

  # Makes code blocks look great
  - pymdownx.superfences

  # Allows to resize images easily
  - attr_list
  - md_in_html

  # Enables LaTeX math rendering (Crucial for documenting your SE3 Controller)
  - pymdownx.arithmatex:
      generic: true

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
